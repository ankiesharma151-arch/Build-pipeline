trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: dotnet-docker-demo

stages:

- stage: Build
  displayName: Build and Push Image
  jobs:

  - job: DockerBuild
    steps:

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: naya-connection
        repository: dotnet-docker-demo
        command: buildAndPush
        Dockerfile: dockerfile
        tags: |
          $(Build.BuildId)